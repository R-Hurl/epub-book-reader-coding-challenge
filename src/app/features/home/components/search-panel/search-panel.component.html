<section aria-label="Search results">
  <div class="panel-header">
    <span>Search Results ({{ results().length }}{{ results().length >= 200 ? '+' : '' }})</span>
  </div>

  @if (isSearching()) {
    <div class="searching-indicator" role="status" aria-live="polite">
      <mat-spinner diameter="20" aria-hidden="true" />
      <span>Searching…</span>
    </div>
  }

  <mat-nav-list>
    @for (result of results(); track result.bookId + result.sectionHref + result.matchIndex) {
      <a
        mat-list-item
        class="result-item"
        role="button"
        tabindex="0"
        [attr.aria-label]="'Go to ' + result.sectionLabel + ' in ' + result.bookTitle"
        (click)="onResultClick(result)"
        (keydown)="onResultKeydown($event, result)"
      >
        <span matListItemTitle class="result-book">{{ result.bookTitle }}</span>
        <span matListItemLine class="result-section">{{ result.sectionLabel }}</span>
        <span
          matListItemLine
          class="result-snippet"
          [innerHTML]="result.snippet"
        ></span>
      </a>
    }
  </mat-nav-list>
</section>
